# /etc/rhelmon/rhelmon.conf
# rhelmon agent configuration
# Lines starting with # are comments.
# Each non-comment line sets a command-line flag: FLAG=VALUE
# Equivalent to running: rhelmon -FLAG VALUE
#
# After editing this file, restart the agent:
#   systemctl restart rhelmon

# ── Core ──────────────────────────────────────────────────────────────────────

# Listen address and port.
# To bind only on a specific IP: ADDR=192.168.1.10:9000
ADDR=:9000

# Ring buffer capacity — samples stored per metric.
# At 1s collection rate: 3600 = 1 hour of history.
HISTORY=3600

# Collection interval (how often /proc is read).
INTERVAL=1s

# WebSocket broadcast interval (how often the dashboard is pushed).
BROADCAST=1s

# ── Plugin loader ─────────────────────────────────────────────────────────────

# Directory scanned for external plugin executables.
PLUGIN_DIR=/etc/rhelmon/plugins

# How often plugins are executed.
PLUGIN_INTERVAL=30s

# Maximum execution time per plugin before it is killed.
PLUGIN_TIMEOUT=10s

# ── Slack alerts ──────────────────────────────────────────────────────────────

# Slack incoming webhook URL (leave empty to disable).
# Get one from: https://api.slack.com/messaging/webhooks
#SLACK_WEBHOOK=https://hooks.slack.com/services/T.../B.../...

# Slack channel override (optional — uses webhook default if empty).
#SLACK_CHANNEL=#alerts

# ── Email alerts (SMTP) ───────────────────────────────────────────────────────

# SMTP server hostname (leave empty to disable email alerts).
#SMTP_HOST=smtp.example.com
#SMTP_PORT=587
#SMTP_USER=alerts@example.com
#SMTP_PASS=yourpassword
#SMTP_FROM=rhelmon@example.com
#SMTP_TO=ops@example.com,oncall@example.com

# ── Prometheus remote write ───────────────────────────────────────────────────

# Remote write endpoint (leave empty to disable).
# Local Prometheus:   PROM_URL=http://localhost:9090/api/v1/write
# Grafana Cloud:      PROM_URL=https://prometheus-prod-XX.grafana.net/api/prom/push
#PROM_URL=
#PROM_USER=
#PROM_PASSWORD=
#PROM_BEARER=
#PROM_INTERVAL=15s

# ── InfluxDB ──────────────────────────────────────────────────────────────────

# InfluxDB base URL (leave empty to disable).
# InfluxDB v2: INFLUX_URL=http://localhost:8086
# InfluxDB v1: INFLUX_URL=http://localhost:8086  (also set INFLUX_V1DB)
#INFLUX_URL=
#INFLUX_TOKEN=
#INFLUX_ORG=
#INFLUX_BUCKET=rhelmon
#INFLUX_V1DB=
#INFLUX_V1USER=
#INFLUX_V1PASS=
#INFLUX_INTERVAL=15s
